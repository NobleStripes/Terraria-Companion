<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Mushroom cap (glowing purple/red) -->
  <ellipse cx="256" cy="180" rx="140" ry="130" fill="#d32f2f"/>
  
  <!-- Mushroom cap glow/highlight -->
  <ellipse cx="256" cy="140" rx="100" ry="80" fill="#ff6b6b" opacity="0.6"/>
  <ellipse cx="200" cy="160" rx="50" ry="40" fill="#ffabab" opacity="0.5"/>
  
  <!-- Mushroom stem -->
  <rect x="220" y="280" width="72" height="160" fill="#e8d5b7" rx="8"/>
  
  <!-- Stem shading -->
  <rect x="220" y="280" width="36" height="160" fill="#d4b598" rx="8"/>
  
  <!-- Mushroom base/gills area -->
  <ellipse cx="256" cy="300" rx="100" ry="40" fill="#c9a875"/>
  
  <!-- Gill lines -->
  <line x1="180" y1="300" x2="332" y2="300" stroke="#a8936d" stroke-width="3"/>
  <line x1="175" y1="310" x2="337" y2="310" stroke="#a8936d" stroke-width="2"/>
  <line x1="172" y1="320" x2="340" y2="320" stroke="#a8936d" stroke-width="2"/>
  
  <!-- Spots on cap (classic red mushroom spots) -->
  <circle cx="200" cy="150" r="20" fill="#fff" opacity="0.8"/>
  <circle cx="312" cy="140" r="25" fill="#fff" opacity="0.7"/>
  <circle cx="256" cy="100" r="18" fill="#fff" opacity="0.8"/>
  <circle cx="340" cy="180" r="22" fill="#fff" opacity="0.7"/>
  <circle cx="160" cy="220" r="20" fill="#fff" opacity="0.7"/>
  
  <!-- Glow effect background -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#ff9999;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d32f2f;stop-opacity:0" />
    </radialGradient>
  </defs>
  <circle cx="256" cy="200" r="180" fill="url(#glow)"/>
</svg>
